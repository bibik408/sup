<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Page</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .card {
      width: min(92vw, 720px);
      padding: 28px;
      border-radius: 14px;
      background: #111827;
      border: 1px solid #334155;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(26px, 4vw, 38px);
    }

    p {
      margin: 0 0 10px;
      line-height: 1.5;
      color: #cbd5e1;
    }

    .ok {
      margin-top: 14px;
      color: #22c55e;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Тестовая страница работает</h1>
    <p>Если ты видишь это сообщение по своему домену — привязка DNS и хостинг настроены правильно.</p>
    <p>Файл: <code>index.html</code> в папке <code>sup</code>.</p>
    <p class="ok">Status: OK</p>
  </main>
</body>
</html>
